name: Generate Weekly Report

on:
  schedule:
    - cron: '0 1 * * 1'  # 毎週月曜 10:00 JST
  workflow_dispatch:
    inputs:
      target_date:
        description: '対象週の終了日 (YYYY-MM-DD)'
        required: false

jobs:
  generate-weekly-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Calculate week dates
        id: dates
        run: |
          python3 - <<'PYEOF'
          import os
          from datetime import datetime, timedelta
          if "${{ github.event.inputs.target_date }}":
              end = datetime.strptime("${{ github.event.inputs.target_date }}", "%Y-%m-%d")
          else:
              today = datetime.now()
              # 直前の日曜日
              days_since_sunday = today.weekday() + 1 if today.weekday() != 6 else 0
              end = today - timedelta(days=days_since_sunday)
          start = end - timedelta(days=6)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"start_date={start.strftime('%Y-%m-%d')}\n")
              f.write(f"end_date={end.strftime('%Y-%m-%d')}\n")
          print(f"週: {start.strftime('%Y-%m-%d')} 〜 {end.strftime('%Y-%m-%d')}")
          PYEOF

      - name: Collect weekly data
        run: |
          python3 - <<'PYEOF'
          import json, os, glob
          from datetime import datetime, timedelta

          start = datetime.strptime("${{ steps.dates.outputs.start_date }}", "%Y-%m-%d")
          end   = datetime.strptime("${{ steps.dates.outputs.end_date }}", "%Y-%m-%d")

          predictions = {}
          results = {}
          reference = {}

          current = start
          while current <= end:
              ds = current.strftime("%Y%m%d")
              # 予測
              for pat in [f"predictions_{ds}.json", f"race_predictions_{ds}.json"]:
                  if os.path.exists(pat):
                      with open(pat) as f:
                          predictions[ds] = json.load(f)
                      break
              # 結果
              for pat in [f"results_{ds}.json", f"race_results_{ds}.json"]:
                  if os.path.exists(pat):
                      with open(pat) as f:
                          results[ds] = json.load(f)
                      break
              # 参考予測
              for pat in [f"reference_predictions_{ds}.json"]:
                  if os.path.exists(pat):
                      with open(pat) as f:
                          reference[ds] = json.load(f)
                      break
              current += timedelta(days=1)

          weekly = {
              "period": {
                  "start": "${{ steps.dates.outputs.start_date }}",
                  "end":   "${{ steps.dates.outputs.end_date }}"
              },
              "predictions": predictions,
              "results": results,
              "reference_predictions": reference
          }
          with open("weekly_data.json", "w", encoding="utf-8") as f:
              json.dump(weekly, f, ensure_ascii=False, indent=2)
          print(f"予測: {len(predictions)}日分, 結果: {len(results)}日分")
          PYEOF

      - name: Generate weekly report
        run: |
          python3 scripts/generate_reports.py             --mode weekly             --input weekly_data.json             --output weekly_report_${{ steps.dates.outputs.end_date }}.md             || python3 scripts/generate_reports.py weekly weekly_data.json weekly_report_${{ steps.dates.outputs.end_date }}.md             || echo "# 週次レポート ${{ steps.dates.outputs.start_date }}〜${{ steps.dates.outputs.end_date }}\n\nデータ収集完了。詳細は各日のJSONファイルを参照。" > weekly_report_${{ steps.dates.outputs.end_date }}.md

      - name: Commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weekly_report_*.md weekly_data.json || true
          git diff --staged --quiet || git commit -m "report: weekly ${{ steps.dates.outputs.start_date }}〜${{ steps.dates.outputs.end_date }}"
          git push
