name: Generate Monthly Report

on:
  schedule:
    - cron: '0 2 1 * *'  # 毎月1日 11:00 JST
  workflow_dispatch:
    inputs:
      target_month:
        description: '対象月 (YYYY-MM)'
        required: false

jobs:
  generate-monthly-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Calculate month dates
        id: dates
        run: |
          python3 - <<'PYEOF'
          import os
          from datetime import datetime, timedelta
          import calendar

          if "${{ github.event.inputs.target_month }}":
              ym = "${{ github.event.inputs.target_month }}"
              year, month = map(int, ym.split("-"))
          else:
              today = datetime.now()
              # 先月
              if today.month == 1:
                  year, month = today.year - 1, 12
              else:
                  year, month = today.year, today.month - 1

          start = datetime(year, month, 1)
          last_day = calendar.monthrange(year, month)[1]
          end = datetime(year, month, last_day)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"start_date={start.strftime('%Y-%m-%d')}\n")
              f.write(f"end_date={end.strftime('%Y-%m-%d')}\n")
              f.write(f"month_label={start.strftime('%Y%m')}\n")
          print(f"月: {start.strftime('%Y-%m-%d')} 〜 {end.strftime('%Y-%m-%d')}")
          PYEOF

      - name: Collect monthly data
        run: |
          python3 - <<'PYEOF'
          import json, os
          from datetime import datetime, timedelta

          start = datetime.strptime("${{ steps.dates.outputs.start_date }}", "%Y-%m-%d")
          end   = datetime.strptime("${{ steps.dates.outputs.end_date }}", "%Y-%m-%d")

          predictions = {}
          results = {}
          reference = {}

          current = start
          while current <= end:
              ds = current.strftime("%Y%m%d")
              for pat in [f"predictions_{ds}.json", f"race_predictions_{ds}.json"]:
                  if os.path.exists(pat):
                      with open(pat) as f:
                          predictions[ds] = json.load(f)
                      break
              for pat in [f"results_{ds}.json", f"race_results_{ds}.json"]:
                  if os.path.exists(pat):
                      with open(pat) as f:
                          results[ds] = json.load(f)
                      break
              for pat in [f"reference_predictions_{ds}.json"]:
                  if os.path.exists(pat):
                      with open(pat) as f:
                          reference[ds] = json.load(f)
                      break
              current += timedelta(days=1)

          monthly = {
              "period": {
                  "start": "${{ steps.dates.outputs.start_date }}",
                  "end":   "${{ steps.dates.outputs.end_date }}"
              },
              "predictions": predictions,
              "results": results,
              "reference_predictions": reference
          }
          with open("monthly_data.json", "w", encoding="utf-8") as f:
              json.dump(monthly, f, ensure_ascii=False, indent=2)
          print(f"予測: {len(predictions)}日分, 結果: {len(results)}日分")
          PYEOF

      - name: Generate monthly report
        run: |
          python3 scripts/generate_reports.py             --mode monthly             --input monthly_data.json             --output monthly_report_${{ steps.dates.outputs.month_label }}.md             || python3 scripts/generate_reports.py monthly monthly_data.json monthly_report_${{ steps.dates.outputs.month_label }}.md             || echo "# 月次レポート ${{ steps.dates.outputs.start_date }}〜${{ steps.dates.outputs.end_date }}\n\nデータ収集完了。" > monthly_report_${{ steps.dates.outputs.month_label }}.md

      - name: Commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add monthly_report_*.md monthly_data.json || true
          git diff --staged --quiet || git commit -m "report: monthly ${{ steps.dates.outputs.month_label }}"
          git push
