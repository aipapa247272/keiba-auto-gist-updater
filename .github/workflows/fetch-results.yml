name: Fetch Race Results

on:
  schedule:
    - cron: '0 13 * * *'  # 毎日 22:00 JST (UTC 13:00) - レース結果取得
  workflow_dispatch:
    inputs:
      date:
        description: '日付（YYYYMMDD形式、空欄=今日）'
        required: false
        default: ''

jobs:
  fetch-results:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install beautifulsoup4 requests
      
      - name: Get date
        id: get_ymd
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ymd="${{ github.event.inputs.date }}"
          else
            ymd=$(TZ=Asia/Tokyo date +%Y%m%d)
          fi
          echo "ymd=${ymd}" >> $GITHUB_OUTPUT
          echo "📅 日付: ${ymd}"
      
      - name: Fetch race results
        run: |
          python scripts/fetch_race_results.py ${{ steps.get_ymd.outputs.ymd }}
      
      # ===== 🆕 展開情報追加ステップ =====
      - name: Add pace information to results
        run: |
          YMD="${{ steps.get_ymd.outputs.ymd }}"
          
          # race_data と race_results の存在確認
          if [ -f "race_data_${YMD}.json" ] && [ -f "race_results_${YMD}.json" ]; then
            echo "📊 Adding pace information..."
            python scripts/add_pace_info.py \
              "race_data_${YMD}.json" \
              "race_results_${YMD}.json" \
              "race_results_${YMD}_temp.json"
            
            # 成功したら上書き
            if [ -f "race_results_${YMD}_temp.json" ]; then
              mv "race_results_${YMD}_temp.json" "race_results_${YMD}.json"
              echo "✅ Pace information added successfully"
            else
              echo "⚠️ Failed to add pace information, using original file"
            fi
          else
            echo "⚠️ Required files not found, skipping pace analysis"
            if [ ! -f "race_data_${YMD}.json" ]; then
              echo "   Missing: race_data_${YMD}.json"
            fi
            if [ ! -f "race_results_${YMD}.json" ]; then
              echo "   Missing: race_results_${YMD}.json"
            fi
          fi
      # ===== 展開情報追加ステップ終了 =====
      
      - name: Generate results summary
        run: |
          if [ -f "scripts/generate_results_summary.py" ]; then
            python scripts/generate_results_summary.py ${{ steps.get_ymd.outputs.ymd }} || echo "⚠️ generate_results_summary.py failed, continuing..."
          else
            echo "⚠️ generate_results_summary.py not found, skipping..."
          fi
      
      - name: Copy to latest results
        run: |
          # race_results JSON を必ずコピー
          if [ -f "race_results_${{ steps.get_ymd.outputs.ymd }}.json" ]; then
            cp race_results_${{ steps.get_ymd.outputs.ymd }}.json latest_results.json
            echo "✅ Copied race_results JSON"
          else
            echo "❌ race_results JSON not found!"
            exit 1
          fi
          
          # results_summary JSON は存在する場合のみコピー
          if [ -f "results_summary_${{ steps.get_ymd.outputs.ymd }}.json" ]; then
            cp results_summary_${{ steps.get_ymd.outputs.ymd }}.json latest_results_summary.json
            echo "✅ Copied results_summary JSON"
          else
            echo "⚠️ results_summary JSON not found, skipping..."
          fi
      
      - name: Update statistics
        run: |
          python scripts/generate_stats.py || echo "⚠️ failed, continuing..."
          if [ -f statistics.json ]; then
          git add statistics.json
          fi

      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 存在するファイルのみ add
          git add race_results_*.json latest_results.json 2>/dev/null || true
          git add results_summary_*.json latest_results_summary.json 2>/dev/null || true
          
          # 変更があればコミット
          if git diff --cached --quiet; then
            echo "⚠️ No changes to commit"
          else
            git commit -m "chore: add race results for ${{ steps.get_ymd.outputs.ymd }}"

            git pull --rebase origin main || true
            
            git push
            echo "✅ Pushed results to repository"
          fi
